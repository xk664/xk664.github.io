# NexT Theme Configuration
# Docs: https://theme-next.js.org/

# Scheme Settings
scheme: Muse

# ---------------------------------------------------------------
# Menu Settings
# ---------------------------------------------------------------
menu:
  home: / || fa fa-home
  notes: /notes/ || fa fa-book
  projects: /projects/ || fa fa-folder-open

# ---------------------------------------------------------------
# Social Links
# ---------------------------------------------------------------
social:
  Email: mailto:kqf664@gmail.com || fa fa-envelope
  GitHub: https://github.com/xk664 || fa fa-github

social_icons:
  enable: true
  icons_only: false
  transition: false

# ---------------------------------------------------------------
# Sidebar Settings
# ---------------------------------------------------------------
sidebar:
  position: left
  width: 260
  display: post
  offset: 12
  b2t: true
  scrollpercent: true
  onmobile: false

# ---------------------------------------------------------------
# Avatar Settings
# ---------------------------------------------------------------
avatar:
  url: /images/avatar.jpg
  rounded: true
  rotated: true

# ---------------------------------------------------------------
# Code Blocks Settings
# ---------------------------------------------------------------
codeblock:
  highlight_theme: night
  prism:
    light: prism
    dark: prism-dark
  copy_button:
    enable: true
    style: flat

# ---------------------------------------------------------------
# Back to Top
# ---------------------------------------------------------------
back2top:
  enable: true
  sidebar: true
  scrollpercent: true

# ---------------------------------------------------------------
# Reading Progress
# ---------------------------------------------------------------
reading_progress:
  enable: true
  position: top
  color: "#ff6b9d"
  height: 3px

# ---------------------------------------------------------------
# Mobile Settings
# ---------------------------------------------------------------
mobile_layout_economy: true
android_chrome_color: "#ff6b9d"
custom_logo: false

# ---------------------------------------------------------------
# Font Settings
# ---------------------------------------------------------------
font:
  enable: true
  host: https://fonts.googleapis.com
  global:
    external: true
    family: ""
    size: 1
  title:
    external: true
    family: ""
    size:
  headings:
    external: true
    family: ""
    size:
  posts:
    external: true
    family: ""
    size:
  codes:
    external: true
    family: ""
    size:

# ---------------------------------------------------------------
# Custom CSS
# ---------------------------------------------------------------
custom_file_path:
  style: source/css/custom.css

# ---------------------------------------------------------------
# TagCloud Settings
# ---------------------------------------------------------------
tagcloud:
  min: 12
  max: 30
  amount: 200
  orderby: name
  order: 1

# ---------------------------------------------------------------
# Category & Tag Settings
# ---------------------------------------------------------------
category_generator:
  per_page: 10

tag_generator:
  per_page: 10
